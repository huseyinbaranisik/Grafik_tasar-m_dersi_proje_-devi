kind = "web"
previewPath = "/"
title = "Samsun Üniversitesi"
version = "1.0.0"
id = "artifacts/samsun-uni"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22453

[services.development]
run = "pnpm --filter @workspace/samsun-uni run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/samsun-uni", "run", "build" ]
publicDir = "artifacts/samsun-uni/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22453"
BASE_PATH = "/"
